name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --ignore=tests/test_shield.py

  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/renderer/package-lock.json

      - name: Install dependencies
        working-directory: src/renderer
        run: npm ci

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Audit renderer dependencies
        working-directory: src/renderer
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript check
        working-directory: src/renderer
        run: npx tsc --noEmit

      - name: Build
        working-directory: src/renderer
        run: npm run build

      - name: Install Playwright browsers
        working-directory: src/renderer
        run: npx playwright install chromium

      - name: Run E2E tests
        working-directory: src/renderer
        run: npx playwright test --reporter=html

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: src/renderer/playwright-report/
          retention-days: 7
