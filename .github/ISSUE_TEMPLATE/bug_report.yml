name: Bug Report
description: Report something that is broken or not working as expected.
labels: ["bug"]
body:
  - type: dropdown
    id: chip
    attributes:
      label: Apple Silicon Chip
      options:
        - M1
        - M1 Pro
        - M1 Max
        - M1 Ultra
        - M2
        - M2 Pro
        - M2 Max
        - M2 Ultra
        - M3
        - M3 Pro
        - M3 Max
        - M4
        - M4 Pro
        - M4 Max
    validations:
      required: true
  - type: dropdown
    id: ram
    attributes:
      label: RAM
      options:
        - 8 GB
        - 16 GB
        - 24 GB
        - 32 GB
        - 48 GB
        - 64 GB
        - 96 GB
        - 128 GB
        - 192 GB
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "e.g. 15.3 (Sequoia)"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: SiliconDev Version
      placeholder: "e.g. 0.4.2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the app
        2. Go to Models tab
        3. Click Download on ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste any relevant error messages or attach screenshots.
    validations:
      required: false
